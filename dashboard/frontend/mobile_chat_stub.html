<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="color-scheme" content="dark">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a12">
    <meta name="mobile-web-app-capable" content="yes">
    <title>GetAiLab Mobile Chat</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        html { color-scheme: dark; background:#0a0a12; }
        body { font-family: system-ui, -apple-system, sans-serif; background:#0a0a12; color:#e0e7ff; margin:0; padding:env(safe-area-inset-top) 0 0; }
        input, textarea, select, button { color-scheme: dark; }
        .header { padding:12px 16px; background:#11111a; border-bottom:1px solid #222; font-size:15px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
        .chat { height: calc(100vh - 200px); overflow:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
        .bubble { max-width:82%; padding:10px 14px; border-radius:18px; font-size:14.5px; line-height:1.35; }
        .agent { background:#1a1a28; align-self:flex-start; border-left:3px solid #c084fc; }
        .user { background:#fcd34d; color:#0a0a12; align-self:flex-end; }
        .inputbar { position:fixed; bottom:0; left:0; right:0; padding:8px 10px calc(8px + env(safe-area-inset-bottom)); background:#11111a; border-top:1px solid #222; display:flex; gap:6px; z-index:10; }
        input { flex:1; background:#1f1f2e; border:1px solid #333; color:#e0e7ff; padding:11px 14px; border-radius:999px; font-size:15px; }
        button { background:#c084fc; color:#0a0a12; border:none; padding:0 18px; border-radius:999px; font-weight:600; }
        .meta { font-size:10px; opacity:0.6; padding:2px 0 0 4px; }
        .quick { display:flex; flex-wrap:wrap; gap:6px; padding:8px 12px; background:#11111a; border-top:1px solid #222; position:fixed; bottom:52px; left:0; right:0; z-index:9; }
        .qa-btn { font-size:12px; padding:4px 10px; border-radius:999px; background:#1f1f2e; border:1px solid #333; color:#c084fc; cursor:pointer; }
        .qa-btn:active { background:#c084fc; color:#0a0a12; }
        .status { font-size:10px; opacity:0.5; text-align:center; padding:2px; }
    </style>
</head>
<body>
    <div class="header">
        <div><span style="font-family:Georgia,serif;font-style:italic;color:#e8e4dc">e<sup style="font-size:0.65em">iπ</sup>+1=0</span> GETAILAB • COUNCIL CHAT <span style="font-size:9px;opacity:.6">(MOBILE STUB — ANDROID / iOS)</span></div>
        <div onclick="window.location.reload()" style="font-size:11px;padding:4px 10px;border:1px solid #444;border-radius:999px">⟳</div>
    </div>
    <div id="chat" class="chat"></div>
    <div class="quick" id="quickbar">
        <!-- Populated dynamically from /api/mobile/chat quick_actions or defaults -->
    </div>
    <div class="inputbar">
        <input id="inp" placeholder="Message the council from Android / iOS..." onkeydown="if(event.key==='Enter')send()">
        <button onclick="send()">SEND</button>
    </div>
    <div class="status" id="statusbar">Cross-platform: same backend as CLI &amp; desktop web. Offline stub supported.</div>
    <script>
        const chat = document.getElementById('chat');
        const inp = document.getElementById('inp');
        const quickbar = document.getElementById('quickbar');
        let hist = [];
        // Offline persistence via localStorage (cross-device mobile stub)
        function loadHistory() {
            try {
                const saved = localStorage.getItem('getailab_mobile_chat_hist');
                if (saved) hist = JSON.parse(saved);
                const msgs = localStorage.getItem('getailab_mobile_chat_msgs');
                if (msgs) {
                    const arr = JSON.parse(msgs);
                    arr.forEach(m => add(m.text, m.isUser, m.agent, true));
                }
            } catch(e) {}
        }
        function saveHistory() {
            try {
                localStorage.setItem('getailab_mobile_chat_hist', JSON.stringify(hist));
            } catch(e) {}
        }
        function saveMsg(text, isUser, agent) {
            try {
                let msgs = JSON.parse(localStorage.getItem('getailab_mobile_chat_msgs') || '[]');
                msgs.push({text, isUser, agent, t: Date.now()});
                if (msgs.length > 30) msgs = msgs.slice(-30);
                localStorage.setItem('getailab_mobile_chat_msgs', JSON.stringify(msgs));
            } catch(e) {}
        }
        function add(text, isUser=false, agent='ORACLE', skipSave=false) {
            const d = document.createElement('div');
            d.className = 'bubble ' + (isUser ? 'user' : 'agent');
            d.innerHTML = (isUser ? '' : `<div class="meta">${agent}</div>`) + text;
            chat.appendChild(d);
            chat.scrollTop = 99999;
            if (!skipSave) saveMsg(text, isUser, agent);
        }
        function setQuickActions(actions) {
            quickbar.innerHTML = '';
            (actions || ["Pulse the field", "Seed hypothesis", "Open library", "New dialectic loop"]).forEach(act => {
                const b = document.createElement('button');
                b.className = 'qa-btn';
                b.textContent = act;
                b.onclick = () => { inp.value = act; send(); };
                quickbar.appendChild(b);
            });
        }
        async function send() {
            const v = inp.value.trim(); if (!v) return;
            add(v, true); hist.push(v); inp.value='';
            saveHistory();
            try {
                const r = await fetch('/api/mobile/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:v, platform: navigator.userAgent.includes('Android') ? 'android' : (navigator.userAgent.includes('iPhone')||navigator.userAgent.includes('iPad') ? 'ios' : 'mobile'), history:hist})});
                const j = await r.json();
                add(j.reply || 'Resonance.', false, j.agent || 'COUNCIL');
                if (j.quick_actions) setQuickActions(j.quick_actions);
                if (j.mobile_optimized) console.log('[Mobile] Optimized reply received.');
            } catch(e) {
                add('Offline stub mode active. Field holds your signal. Reconnect for live synthesis (or pulse).', false, 'STUB');
                // Offline echo back to field
                if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
                    navigator.serviceWorker.controller.postMessage({type: 'OFFLINE_CHAT'});
                }
            }
        }
        async function loadMobileStatus() {
            try {
                const r = await fetch('/api/mobile/status');
                const j = await r.json();
                document.getElementById('statusbar').textContent = `GetAiLab ${j.version} • ${j.getailab} • Platforms: ${j.platforms ? j.platforms.join(', ') : 'universal'}`;
                if (j.quick_actions) setQuickActions(j.quick_actions); // if status had, but uses chat
            } catch(e) {
                document.getElementById('statusbar').textContent = 'Offline / local stub. Live sync when reconnected.';
            }
        }
        // Initial mobile welcome + restore
        setTimeout(() => {
            loadHistory();
            if (chat.children.length < 2) {
                add("Mobile Council online. Same intelligence as desktop CLI & web. What moves you?", false, 'MOBILE', true);
                add("Try 'pulse the field' or ask about the latest loop. Quick actions below.", false, 'FIELD', true);
            }
            setQuickActions(["Pulse the field", "Seed hypothesis from council", "Open library vault", "Start new dialectic loop"]);
            loadMobileStatus();
        }, 420);
        // Expose for native bridges (Kotlin Android WebView / Swift WKWebView)
        // Call from native: webView.evaluateJavascript("window.sendChatFromNative('your message')", null);
        window.sendChatFromNative = function(msg) { 
            inp.value = msg; 
            send(); 
        };
        // Also expose status for native
        window.getMobileStatus = loadMobileStatus;
        // PWA / install hint for Android/iOS
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(() => console.log('[PWA] SW registered for mobile stub offline.')).catch(()=>{});
            });
        }
        console.log('%c[GetAiLab Mobile Stub] Enhanced: offline hist, quick actions UI, native bridge, PWA. Ready for Android/iOS WebView or standalone.', 'color:#64748b');
    </script>
</body>
</html>
