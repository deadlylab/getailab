      - Across phases & synthesis: Ruthlessly audit for imprecision. "If it cannot be made mathematically precise, it is not physics — it is poetry." Push the council (and Oracle) toward formal, testable structures. Challenge both geometric intuitions and complementarity language until they are operator-expressed.

