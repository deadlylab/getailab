# GET AI LAB / GetAiLab — Docker Compose
#
# Default (dashboard + APIs):
#   docker compose up -d
#   → http://localhost:5035
#
# Full scientist squad (required for dialectic loops in containers):
#   docker compose --profile squad up -d
#
# CLI chat (lab + oracle only):
#   docker compose --profile cli run --rm cli
#
# Full loop inside containers (needs squad profile running):
#   docker compose --profile squad --profile cli run --rm loop
#
# Host Ollama: containers reach it via host.docker.internal:11434 (Linux uses host-gateway).

x-example-env: &example-env
  PYTHONPATH: /app
  LAB_ID: example
  GETAILAB_USER_ID: default
  ORACLE_URL: http://oracle:5024
  LAB_URL: http://lab:5035
  LLM_ENDPOINT: ${LLM_ENDPOINT:-http://host.docker.internal:11434}

x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-data-volumes: &data-volumes
  - ./data:/app/data
  - ./logs:/app/logs
  - ./chimera_lab.db:/app/chimera_lab.db

x-scientist-base: &scientist-base
  build: .
  image: getailab:latest
  profiles: ["squad"]
  env_file:
    - .env
  environment:
    <<: *example-env
  volumes: *data-volumes
  <<: *extra-hosts
  depends_on:
    lab:
      condition: service_healthy
    oracle:
      condition: service_healthy
  restart: unless-stopped

services:
  lab:
    build: .
    image: getailab:latest
    ports:
      - "${LAB_HOST_PORT:-5035}:5035"
    volumes:
      - ./data:/app/data
      - ./lab/artifacts:/app/lab/artifacts
      - ./logs:/app/logs
      - ./chimera_lab.db:/app/chimera_lab.db
      - ./lab/lab_results.db:/app/lab/lab_results.db
    env_file:
      - .env
    environment:
      <<: *example-env
    <<: *extra-hosts
    depends_on:
      oracle:
        condition: service_healthy
    command: ["python", "lab/app_lab.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5035/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  oracle:
    build: .
    image: getailab:latest
    ports:
      - "${ORACLE_HOST_PORT:-5024}:5024"
    volumes: *data-volumes
    env_file:
      - .env
    environment:
      <<: *example-env
    <<: *extra-hosts
    command: ["python", "scientists/app_oracle.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5024/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

