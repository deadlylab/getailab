# GetAiLab — Docker Compose (example lab)
#
# Full example stack (dashboard + dialectic loops):
#   docker compose up -d
#   → http://localhost:5135
#
# Dashboard + Oracle only (no scientists):
#   docker compose up -d oracle lab
#
# CLI chat:
#   docker compose --profile cli run --rm cli
#
# Full loop (stack must be up):
#   docker compose --profile cli run --rm loop
#
# Helper script: ./docker.sh up | status | loop | down
#
# Host Ollama: containers use host.docker.internal:11434 (Linux: host-gateway).

x-example-env: &example-env
  PYTHONPATH: /app
  LAB_ID: example
  PERSONAS_YAML: personas/example_squad.yaml
  GETAILAB_USER_ID: default
  ORACLE_PORT: "5124"
  LAB_PORT: "5135"
  ORACLE_URL: http://oracle:5124
  LAB_URL: http://lab:5135
  AGORA_DB: /app/data/labs/example/agora.db
  LLM_ENDPOINT: ${LLM_ENDPOINT:-http://host.docker.internal:11434}

x-extra-hosts: &extra-hosts
  extra_hosts:
    - "host.docker.internal:host-gateway"

x-data-volumes: &data-volumes
  - ./data:/app/data
  - ./logs:/app/logs

x-scientist-base: &scientist-base
  build: .
  image: getailab:latest
  env_file:
    - .env
  environment:
    <<: *example-env
  volumes: *data-volumes
  <<: *extra-hosts
  depends_on:
    lab:
      condition: service_healthy
    oracle:
      condition: service_healthy
  restart: unless-stopped

services:
  oracle:
    build: .
    image: getailab:latest
    ports:
      - "${ORACLE_HOST_PORT:-5124}:5124"
    volumes: *data-volumes
    env_file:
      - .env
    environment:
      <<: *example-env
    <<: *extra-hosts
    command: ["python", "scientists/app_oracle.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5124/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  lab:
    build: .
    image: getailab:latest
    ports:
      - "${LAB_HOST_PORT:-5135}:5135"
    volumes: *data-volumes
    env_file:
      - .env
    environment:
      <<: *example-env
    <<: *extra-hosts
    depends_on:
      oracle:
        condition: service_healthy
    command: ["python", "lab/app_lab.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5135/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  researcher:
    <<: *scientist-base
    ports:
      - "${RESEARCHER_HOST_PORT:-5125}:5125"
    environment:
      <<: *example-env
      AGENT_PORT: "5125"
    command: ["python", "scientists/forges/example/app_researcher.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5125/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  critic:
    <<: *scientist-base
    ports:
      - "${CRITIC_HOST_PORT:-5126}:5126"
    environment:
      <<: *example-env
      AGENT_PORT: "5126"
    command: ["python", "scientists/forges/example/app_critic.py"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5126/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  cli:
    build: .
    image: getailab:latest
    profiles: ["cli"]
    env_file:
      - .env
    environment:
      <<: *example-env
    volumes: *data-volumes
    <<: *extra-hosts
    command: ["python", "run_chimera.py", "--chat"]
    depends_on:
      lab:
        condition: service_healthy
      oracle:
        condition: service_healthy
      researcher:
        condition: service_healthy
      critic:
        condition: service_healthy
    stdin_open: true
    tty: true

  loop:
    build: .
    image: getailab:latest
    profiles: ["cli"]
    env_file:
      - .env
    environment:
      <<: *example-env
      SCIENTIST_HOST_MODE: docker
    volumes:
      - .:/app
    <<: *extra-hosts
    command: ["python", "run_chimera.py"]
    depends_on:
      lab:
        condition: service_healthy
      oracle:
        condition: service_healthy
      researcher:
        condition: service_healthy
      critic:
        condition: service_healthy
    stdin_open: true
    tty: true